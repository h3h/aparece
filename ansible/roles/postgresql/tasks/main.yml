---
- name: Add PostgreSQL APT key
  apt_key:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    state: present

- name: Add PostgreSQL APT repository
  apt_repository:
    repo: "deb http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg
    update_cache: yes

- name: Install PostgreSQL
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - libpq-dev
    state: present

- name: Get PostgreSQL version
  shell: ls /etc/postgresql/ | head -1
  register: pg_version
  changed_when: false

- name: Configure PostgreSQL to listen on all interfaces
  lineinfile:
    path: "/etc/postgresql/{{ pg_version.stdout }}/main/postgresql.conf"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
  notify: Restart PostgreSQL

- name: Configure PostgreSQL authentication
  copy:
    dest: "/etc/postgresql/{{ pg_version.stdout }}/main/pg_hba.conf"
    content: |
      # PostgreSQL Client Authentication Configuration File
      # TYPE  DATABASE        USER            ADDRESS                 METHOD
      local   all             postgres                                peer
      local   all             all                                     peer
      host    all             all             127.0.0.1/32            scram-sha-256
      host    all             all             ::1/128                 scram-sha-256
      host    all             all             0.0.0.0/0               scram-sha-256
      host    all             all             ::/0                    scram-sha-256
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart PostgreSQL

- name: Enable and start PostgreSQL
  systemd:
    name: postgresql
    enabled: yes
    state: started

- name: Create credentials directory
  file:
    path: /opt/aparece/credentials
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Generate PostgreSQL superuser password
  shell: |
    if [ -f /opt/aparece/credentials/pg_admin_password ]; then
      cat /opt/aparece/credentials/pg_admin_password
    else
      openssl rand -base64 18 | tr -d '/+=' | head -c 24 | tee /opt/aparece/credentials/pg_admin_password
    fi
  register: pg_admin_password_result
  changed_when: false
  no_log: true

- name: Set pg_admin_password fact
  set_fact:
    pg_admin_password: "{{ pg_admin_password_result.stdout }}"

- name: Generate PostgreSQL app user password
  shell: |
    if [ -f /opt/aparece/credentials/pg_app_password ]; then
      cat /opt/aparece/credentials/pg_app_password
    else
      openssl rand -base64 18 | tr -d '/+=' | head -c 24 | tee /opt/aparece/credentials/pg_app_password
    fi
  register: pg_app_password_result
  changed_when: false
  no_log: true

- name: Set pg_app_password fact
  set_fact:
    pg_app_password: "{{ pg_app_password_result.stdout }}"

- name: Check if postgres superuser password is set
  become: yes
  become_user: postgres
  command: psql -tAc "SELECT passwd IS NOT NULL FROM pg_shadow WHERE usename = 'postgres';"
  register: pg_admin_has_password
  changed_when: false

- name: Set postgres superuser password
  become: yes
  become_user: postgres
  command: psql -c "ALTER USER postgres PASSWORD '{{ pg_admin_password }}';"
  when: pg_admin_has_password.stdout != 't'
  no_log: true

- name: Check if app user exists
  become: yes
  become_user: postgres
  command: psql -tAc "SELECT 1 FROM pg_roles WHERE rolname = 'app';"
  register: pg_app_user_exists
  changed_when: false

- name: Create app user with password
  become: yes
  become_user: postgres
  command: psql -c "CREATE ROLE app WITH LOGIN PASSWORD '{{ pg_app_password }}';"
  when: pg_app_user_exists.stdout != '1'
  no_log: true

- name: Verify PostgreSQL installation
  become: yes
  become_user: postgres
  command: psql --version
  register: postgres_version
  changed_when: false

- name: Display PostgreSQL version
  debug:
    msg: "PostgreSQL installed: {{ postgres_version.stdout }}"

- name: Display PostgreSQL credentials
  debug:
    msg:
      - "PostgreSQL credentials:"
      - "  Superuser:  postgres / {{ pg_admin_password }}"
      - "  App user:   app / {{ pg_app_password }}"
