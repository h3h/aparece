---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Check for available package upgrades
  command: apt-get -s dist-upgrade
  register: upgrade_dry_run
  changed_when: false

- name: Upgrade all packages
  apt:
    upgrade: dist
    autoremove: yes
  when: "'0 upgraded, 0 newly installed, 0 to remove' not in upgrade_dry_run.stdout"

- name: Check if reboot is required after kernel upgrade
  stat:
    path: /var/run/reboot-required
  register: reboot_required_file

- name: Install security packages
  apt:
    name:
      - ufw
      - fail2ban
      - unattended-upgrades
      - apt-listchanges
      - ubuntu-advantage-tools
    state: present

- name: Check Ubuntu Pro attachment status
  command: pro status --format json
  register: pro_status_raw
  changed_when: false
  failed_when: false

- name: Enable Ubuntu Pro ESM Apps
  command: pro enable esm-apps --assume-yes
  register: esm_result
  changed_when: "'already enabled' not in esm_result.stdout"
  failed_when: false
  when:
    - pro_status_raw.rc == 0
    - (pro_status_raw.stdout | default('{}') | from_json).attached | default(false)

- name: Configure sysctl security parameters
  template:
    src: sysctl.conf.j2
    dest: /etc/sysctl.d/99-security.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl

- name: Configure UFW defaults
  ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: Allow SSH through UFW
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled

- name: Configure fail2ban for SSH
  copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled = true
      port = ssh
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 5
      bantime = 3600
      findtime = 600
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Enable fail2ban service
  systemd:
    name: fail2ban
    enabled: yes
    state: stopped # TODO: enable after iterating

- name: Configure unattended-upgrades
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    owner: root
    group: root
    mode: "0644"

# CVE-2026-31431 (Copy Fail): local privilege escalation via algif_aead
- name: Blacklist algif_aead kernel module (CVE-2026-31431)
  copy:
    dest: /etc/modprobe.d/disable-algif_aead.conf
    content: "install algif_aead /bin/false\n"
    owner: root
    group: root
    mode: "0644"

- name: Unload algif_aead kernel module if currently loaded (CVE-2026-31431)
  command: rmmod algif_aead
  register: rmmod_result
  changed_when: rmmod_result.rc == 0
  failed_when:
    - rmmod_result.rc != 0
    - "'not currently loaded' not in rmmod_result.stderr"
    - "'No such module' not in rmmod_result.stderr"

- name: Reboot to activate updated kernel
  command: reboot
  async: 1
  poll: 0
  when: reboot_required_file.stat.exists
